<h2>行为</h2>

<p>手形工具用于操作与组件关联的当前值。具体行为取决于被单击的组件；各组件页面的“手形工具行为”部分会分别说明。以下组件均支持手形工具。</p>
<blockquote><table>
<tr>
<td valign="top"><strong>线路库</strong></td>
	<td>
<a href="../wiring/pin.html">引脚</a> <br><a href="../wiring/clock.html">时钟</a>
</td>
</tr>
<tr>
<td valign="top"><strong>存储器库</strong></td>
	<td>
<a href="../mem/flipflops.html">D/T/J-K/S-R 触发器</a> <br><a href="../mem/register.html">寄存器</a> <br><a href="../mem/counter.html">计数器</a> <br><a href="../mem/shiftreg.html">移位寄存器</a> <br><a href="../mem/ram.html">RAM</a> <br><a href="../mem/rom.html">ROM</a>
</td>
</tr>
<tr>
<td valign="top"><strong>输入/输出库</strong></td>
	<td>
<a href="../io/button.html">按钮</a> <br><a href="../io/joystick.html">操纵杆</a> <br><a href="../io/keyboard.html">键盘</a>
</td>
</tr>
</table></blockquote>
<p>此外，使用手形工具单击导线线段会显示该导线当前携带的值，如<a href="wiring.html">布线工具页面</a>所述。</p>

<h2>属性</h2>

<p>无。不过，单击支持手形工具的组件会显示该组件的属性。</p>
