    <div class="maindiv">
      <h1>
        仿真选项卡
      </h1>
      <p align="center">
        <img src="../../../img-guide/prefs-simulation.png" alt="#########">
      </p>
      <p>
        此选项卡包含影响仿真期间导线颜色以及卡诺图所用颜色的首选项。
      </p>
      <p>
	     在上半部分，可以定义仿真在不同状态下的导线颜色，以及显示导线状态时使用的字符。
	  </p>
	  <p>
	    在下半部分，可以设置卡诺图中各分组使用的颜色。
      </p>
	  <p>
	    使用方法很简单：选择按钮后会出现颜色选择器，随后即可选择并更改颜色。
</p>
	  <p>
		另有两个按钮：<b class="button">Logisim 默认颜色</b> 用于恢复默认颜色，<b class="button">色盲友好配色</b> 用于切换到更便于色觉障碍人士阅读的配色。
	  </p>
      <p>
        <b>下一节：</b> <a href="pref-exp.html">实验性选项卡</a>。
      </p>
    </div>
