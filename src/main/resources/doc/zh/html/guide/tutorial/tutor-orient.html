      <h2>
        第 0 步：熟悉界面
      </h2>
      <p>
        启动 Logisim 后，会看到类似下面的窗口。不同系统下，一些细节可能略有差异。
      </p>
      <p align="center">
        <img src="../../../img-guide/tutorial-0-blank.png" alt="0-blank">
      </p>
      <p>
        Logisim 窗口整体分为三个部分，分别是<a href="../gui/gui-explore.html">资源管理器窗格</a>、<a href="../gui/gui-attribut.html">属性表</a>和<a href="../gui/gui-canvas.html">画布</a>。这些部分之上是<a href="../gui/gui-menu.html">菜单栏</a>和<a href="../gui/gui-toolsbar.html">工具栏</a>。
      </p>
      <p align="center">
        <img src="../../../img-guide/tutorial-shot-labeled.png" alt="#########">
      </p>
      <p>
        资源管理器窗格和属性表可以暂时略过：本教程不会涉及它们。此外，<a href="../menu/index.html">菜单栏</a>的作用也比较直观。
      </p>
      <p>
        剩下的是<a href="../gui/gui-toolsbar.html">工具栏</a>和<a href="../gui/gui-canvas.html">画布</a>。画布用于绘制电路；工具栏则提供完成这一任务所需的工具。
      </p>
      <p>
        <b>下一节：</b> <a href="tutor-gates.html">第 1 步：添加门电路</a>
      </p>
