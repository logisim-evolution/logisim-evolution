<h1>表格选项卡</h1>

<p>表格选项卡以表格形式显示当前日志。</p>

<p align="center"><img src="../../../img-guide/log-table.png" width="466" height="387"></p>

<p>所选内容中的每个组件在表格中占一列。表格中的每一行显示值传播完成后的仿真快照。任何重复的行都不会添加到日志中。请注意，仅显示最近的 400 行。如果计算该行时对应的组件尚未加入所选内容，某些行可能会有空条目。</p>

<p>显示的表格仅供查看；它不可交互。</p>

<p><b>下一节：</b> <a href="_file.html">文件选项卡</a>。</p>
