      <h1>
        层次化设计
      </h1>
      <p>
        当您构建越来越复杂的电路时，您将希望构建更小的电路，并将其作为模块多次用于更大的电路中。在 Logisim 中，这种在更大电路中使用的更小电路称为 <strong>子电路</strong>。
      </p>
      <p>
        如果您熟悉计算机编程，那么您一定熟悉子程序的概念，无论它在您喜欢的语言中被称为 <em>子例程</em>、<em>函数</em>、<em>方法</em> 还是 <em>过程</em>。子电路的概念与此类似，并且服务于相同的目的：将大型任务分解为小块，节省多次定义相同概念的工作量，并便于调试。
      </p>
