  <body>
    <div class="maindiv">
      <h1>
        以矩阵形式放置组件
      </h1>
      <p>
        在 Logisim-evolution 中，可以在原理图上以矩阵形式批量放置组件。具体操作如下：在<a href="../gui/gui-explore.html">资源管理器窗格</a>中选择所需工具，例如 LED，将其移动到工作区；在单击放置之前按下 <b class="tkeybd">X</b> 键。组件的阴影会变为一个小的 2x2 矩阵。
      </p>
      <p align="center">
        <img class="notscal" src="../../../../img-guide/feature-3-ghostmatrix.png" alt="#########">
      </p>
      <p>
        单击矩阵目标位置的左上角，然后填写表单数据。例如，可以创建 4x5 个元素、间距为 4 的矩阵。
      </p>
      <p align="center">
        <img class="notscal" src="../../../../img-guide/feature-4-matrix.png" alt="#########">
      </p>
      <p>
        如果启用了自编号标签，组件会按 _X_Y 格式标记，例如 Led_X1_Y0。
      </p>
      <p>
        <b>返回：</b> <a href="../index.html">Logisim 用户指南</a>。
      </p>
    </div>
  </body>
