      <h1>
        项目选项
      </h1>
      <p>
        Logisim 支持两类配置选项：<em>应用程序首选项</em> 和 <em>项目选项</em>。应用程序首选项会影响所有打开的项目，而项目选项只作用于某一个项目。本节讨论项目选项；<a href="../prefs/">应用程序首选项</a> 在另一节中介绍。
      </p>
      <p>
        通过<b class="menu">| 项目 |</b>→<b class="menu">| 选项... |</b>可以查看和编辑项目选项。Logisim 会打开带有多个选项卡的选项窗口。
      </p>
      <p align="center">
        <img src="../../../img-guide/opts-simulate.png" alt="#########">
      </p>
      <p>
        下面分别介绍这些选项卡。
      </p>

      </blockquote>
      <p>
        <b>下一节：</b> <a href="opts-simulate.html">仿真选项卡</a>。
