    <h1>
      二进制数据（大端）
    </h1>
    <div class="maindiv">
      <p>
        此格式是文件中存储器数据的原始二进制映像。它没有文件头、注释或编码，通常不能用普通文本编辑器编辑。<br> 在大端模式下，无论存储器字的位宽是多少，存储器都按字节序列处理，从左到右依次写入高字节和低字节。图示见<a href="mem-v3byte.html#addr">v3.0 十六进制字节格式（带地址大端）</a>。
      </p>
      <h1 id="addr">
        二进制数据（小端）
      </h1>
      <p>
        此格式与前一格式相同。<br> 在小端模式下，存储器按字节序列处理，从右到左先写入低字节，再写入高字节。图示见<a href="mem-v3byte.html#addr-little">v3.0 十六进制字节格式（带地址小端）</a>。
      </p>
      <p>
        <strong>下一节：</strong> <a href="mem-menu.html">弹出菜单与文件</a>。
      </p>
    </div>
