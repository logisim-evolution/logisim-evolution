tableRemark4 = # Подсказки и примечания по форматированию:\n# * Вы можете отредактировать этот файл и импортировать его обратно в Logisim!\n# * Все, что следует за символом «#», является комментарием и игнорируется.\n# * Пустые строки и разделительные линии (например, ~~~~~~~~) игнорируются.\n# * Имена столбцов должны быть простыми (без пробелов, знаков препинания и т.д.).\n# * «Name[N..0]» указывает на (N+1)-битную переменную, в то время как\n#   «Name» без индексов указывает на 1-битную переменную.\n# * Вы можете использовать «x» или «-», чтобы указать состояние «безразлично» (don't care) для входных и выходных битов.\n# * Вы можете использовать двоичную (например, «10100011xxxx») или шестнадцатеричную (например, «C3x») запись. Logisim автоматически определит формат.
