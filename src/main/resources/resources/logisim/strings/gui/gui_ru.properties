realCoarse = Грубый шаг (реальное время)
realCoarseDescription = Данные фиксируются непрерывно при включенном моделировании, но кратковременные колебания сигналов игнорируются. Каждая секунда реального времени записывается как %s времени моделирования схемы.
realFine = Точный шаг (реальное время)
realFineDescription = Данные фиксируются непрерывно при включенном моделировании, включая кратковременные колебания сигналов. Каждая секунда реального времени записывается как %s времени моделирования схемы.
clockTime = Тактовый режим
clockCoarse = Грубый шаг
clockCoarseDescriptionDual = Данные фиксируются при каждом переходе тактового сигнала (фронте и спаде), игнорируя любые переходные процессы между переходами или при распространении. Каждый такт записывается так, как если бы он занимал %s на период (%s на полутакт).
clockCoarseDescriptionRising = Данные фиксируются при каждом фронте тактового сигнала, игнорируя любые переходные процессы между переходами или при распространении. Каждый такт записывается так, как если бы он занимал %s на период (%s на полутакт).
clockCoarseDescriptionFalling = Данные фиксируются при каждом спаде тактового сигнала, игнорируя любые переходные процессы между переходами или при распространении. Каждый такт записывается так, как если бы он занимал %s на период (%s на полутакт).
clockCoarseDescriptionHigh = Данные фиксируются непрерывно только при высоком уровне тактового сигнала, игнорируя любые переходные процессы при распространении или при низком уровне тактового сигнала. Изменения при высоком уровне записываются так, как если бы задержка элемента составляла %s, а каждый такт — как если бы он занимал %s на период (%s на полутакт).
clockCoarseDescriptionLow = Данные фиксируются непрерывно только при низком уровне тактового сигнала, игнорируя любые переходные процессы при распространении или при высоком уровне тактового сигнала. Изменения при низком уровне записываются так, как если бы задержка элемента составляла %s, а каждый такт — как если бы он занимал %s на период (%s на полутакт).
clockFine = Точный шаг
clockFineDescription = Данные фиксируются при любом изменении значений сигналов, включая любые переходные процессы при распространении. Переходные процессы записываются так, как если бы задержка элемента составляла %s, а каждый такт — как если бы он занимал %s на период (%s на полутакт).
