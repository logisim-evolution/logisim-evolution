stepFineDescription = Данные фиксируются при любом изменении значений сигналов, включая кратковременные колебания при распространении. Переходные процессы записываются так, как если бы задержка элемента составляла %s, а стабильные сигналы — как если бы они оставались стабильными в течение %s.
