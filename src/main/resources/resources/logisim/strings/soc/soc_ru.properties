#
AssemblerAssumingEntryPoint = Предполагается, что наименьший адрес с инструкцией является точкой входа.\nЧтобы убедиться, что процессор начнёт выполнение с нужного адреса,\nпожалуйста, добавьте метку с именем «_start» в место,\nоткуда должно начаться выполнение программы.
AssemblerCannotUseInsideMacro = Эту конструкцию невозможно использовать внутри определения макроса
AssemblerEndOfMacroNotFound = Не удалось найти конец определения макроса
AssemblerExpectedMacroName = Ожидалось имя макроса
AssemblerExpectedMacroNrOfParameters = Ожидалось количество параметров макроса
AssemblerExpectingLabelIdentifier = Ожидается метка
AssemblerMissingLabelBefore = Для этого оператора должна быть задана метка
AssemblerNoExecutableSection = Не найдено исполняемых инструкций.
AssemblerReguiresNumberAfterMath = После математической операции должно следовать число
AssemblerUnknowCharacter = Неизвестный символ
AssemblerWrongClosingBracket = Этот тип закрывающей скобки не поддерживается
AssemblerWrongOpeningBracket = Этот тип открывающей скобки не поддерживается
#
# util/AssemblerAsmInstruction.java
#
AssemblerCouldNotFindAddressForLabel = Не удалось определить адрес для этой метки
AssemblerCouldNotFindValueForDefine = Не удалось найти определение параметра
AssemblerDivZero = Ошибка деления на ноль
AssemblerExpectedImmediateValueAfterMath = Ожидалось непосредственное значение после математической операции
#
# util/AssemblerInfo.java
#
AssemblerDuplicatedLabelNotSupported = Имена меток должны быть уникальными, найдено несколько определений этой метки
AssemblerDuplicatedName = Невозможно использовать одно и то же имя для .equ и метки
AssemblerDuplicatedSectionError = Имена секций должны быть уникальными, найдено несколько секций с одинаковым именем
AssemblerExpectedLabel = Ожидалась метка
AssemblerExpectedLabelAndNumber = Ожидалась метка, за которой следует непосредственное значение
AssemblerExpectedParameter = Ожидался параметр в этой позиции
AssemblerExpectingNumber = Ожидалось число
AssemblerExpectingPositiveNumber = Ожидалось положительное число
AssemblerExpectingSectionName = Ожидается имя секции
AssemblerExpectingString = Ожидалась строка
AssemblerMacroIncorrectNumberOfParameters = Указано некорректное количество параметров макроса
AssemblerOverlappingSections = Эта секция перекрывается с другой секцией
AssemblerUnknownIdentifier = Неизвестный идентификатор
AssemblerUnknownLabel = Эта метка не определена и не может быть использована
AssemblerUnsupportedAssemblerInstruction = Неизвестная директива/инструкция ассемблера
AssemblerValueOutOfRange = Значение выходит за допустимые пределы
#
# util/AssemblerMacro.java
#
AssemblerMacroCallingEachotherDeadlock = Взаимный вызов макросов привёл к тупиковой ситуации (deadlock)
AssemblerMacroCannotUseRecurency = Макрос вызывает сам себя, что приводит к бесконечной рекурсии (deadlock)
AssemblerMacroParameterNotDefined = Этот параметр макроса не определён, проверьте количество параметров в определении макроса
