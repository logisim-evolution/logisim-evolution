PioMenuBidirFunctionsRemark = /* С помощью следующих функций можно задать или считать значения двунаправленного регистра.\n * Единица означает, что соответствующий бит работает на вывод, ноль — на ввод.\n * Примечание: используются только младшие %s бит.\n */
PioMenuCaptureAll = очистить все биты регистра захвата независимо от значения параметра «value»
PioMenuCaptureAny = хотя бы одно изменение значения (0 -> 1 или 1 -> 0)
PioMenuCaptureBit = очистить биты регистра захвата, которые установлены в 1 в параметре «value»
PioMenuCaptureFalling = хотя бы один спад (1 -> 0)
PioMenuCaptureRising = хотя бы один фронт (0 -> 1)
PioMenuEdgeCaptureRemark = /* С помощью следующих функций можно считать или очистить регистр захвата фронтов.\n * При чтении регистра единица в соответствующей позиции указывает на то,\n * что на входе произошёл %s,\n * иначе значение входа не изменялось.\n *\n * Запись в этот регистр выполнит: %s.\n * Примечание: используются только младшие %s бит.\n */
PioMenuInputDataFunctionRemark = /* С помощью следующей функции можно считать значения со входов PIO.\n * Функция возвращает соответствующее значение.\n * Примечание: действительны только младшие %s бит.\n */
PioMenuIrqEdge = соответствующий бит в регистре захвата
PioMenuIrqLevel = соответствующий вход
PioMenuMaskFunctionsRemark = /* С помощью следующих функций можно задать или считать регистр маски прерываний.\n * Единица в определённой позиции означает, что прерывание будет сгенерировано,\n * если %s равно 1.\n * Примечание: используются только младшие %s бит.\n */
PioMenuOutClearRemark = /* С помощью следующей функции биты, установленные в 1 в параметре «value», принудительно\n * установят соответствующий выход в 0.\n * Примечание: используются только младшие %s бит.\n */
PioMenuOutputDataFunctionRemark = /* С помощью следующей функции можно задать значения на выходах PIO.\n * Функция принимает новое выходное значение в качестве параметра «value».\n * Примечание: действительны только младшие %s бит параметра «value».\n */
PioMenuOutSetRemark = /* С помощью следующей функции биты, установленные в 1 в параметре «value», принудительно\n * установят соответствующий выход в 1.\n * Примечание: используются только младшие %s бит.\n */
